<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6df9e"/>
      <stop offset="30%" stop-color="#c49a3c"/>
      <stop offset="55%" stop-color="#f8e7b6"/>
      <stop offset="80%" stop-color="#8d5f27"/>
      <stop offset="100%" stop-color="#d7b56f"/>
    </linearGradient>
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(184,146,74,0)"/>
      <stop offset="50%" stop-color="rgba(184,146,74,0.7)"/>
      <stop offset="100%" stop-color="rgba(184,146,74,0)"/>
    </linearGradient>
  </defs>

  <!-- BM monogram -->
  <text x="10" y="108" font-family="Georgia, 'Times New Roman', serif" font-size="108" font-weight="700" fill="url(#goldGrad)" letter-spacing="-4">BM</text>

  <!-- divider vertical -->
  <line x1="162" y1="18" x2="162" y2="142" stroke="rgba(184,146,74,0.35)" stroke-width="1"/>

  <!-- BRUNO MIRANDA -->
  <text x="178" y="72" font-family="'Montserrat', Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="4" fill="#ffffff">BRUNO MIRANDA</text>

  <!-- separator line -->
  <line x1="178" y1="86" x2="510" y2="86" stroke="url(#dividerGrad)" stroke-width="1"/>

  <!-- ADVOCACIA -->
  <text x="178" y="108" font-family="'Montserrat', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="6" fill="url(#goldGrad)">ADVOCACIA</text>

  <!-- OAB/PR 113.470 -->
  <text x="178" y="132" font-family="'Montserrat', Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="2.5" fill="rgba(255,255,255,0.45)">OAB/PR 113.470</text>
</svg>
